<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Chords</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <!-- Dynamic blurred album art background -->
  <div id="dynamic-bg"></div>

  <!-- Settings panel -->
  <div id="settings-overlay" onclick="if(event.target===this)closeSettings()"></div>
  <div id="settings-panel">
    <div class="settings-header">
      <span>Cuenta Spotify</span>
      <button onclick="closeSettings()" class="settings-close">✕</button>
    </div>
    <span class="status-pill" id="auth-status-pill">Sin conectar</span>
    <p id="auth-helper" class="settings-helper"></p>
    <div class="settings-btns">
      <button type="button" class="button button-primary" id="connect-btn">Conectar Spotify</button>
      <button type="button" class="button button-secondary" id="disconnect-btn">Desconectar</button>
    </div>
  </div>
  <button id="gear-btn" onclick="openSettings()">⚙︎</button>

  <div class="page-shell">

    <!-- NOW PLAYING CARD -->
    <section class="card now-playing-card">
      <!-- Top: label + pill -->
      <div class="np-top">
        <span class="section-label">Now Playing</span>
        <span class="status-pill status-pill-muted" id="playback-pill">Esperando</span>
      </div>

      <!-- Cover art — large -->
      <div class="cover-wrap">
        <div class="cover-art" id="cover-art">♫</div>
      </div>

      <!-- Track info below cover -->
      <div class="track-info">
        <p class="track-kicker" id="track-kicker">Conecta Spotify para empezar</p>
        <h2 class="track-title" id="track-title">Sin canción activa</h2>
        <p class="track-artist" id="track-artist">—</p>
        <p class="track-album" id="track-album"></p>
      </div>

      <!-- Progress -->
      <div class="progress-block">
        <div class="progress-rail"><span id="progress-fill"></span></div>
        <div class="progress-labels">
          <span id="progress-left">0:00</span>
          <span id="progress-right">0:00</span>
        </div>
      </div>

      <!-- Bottom meta -->
      <div class="np-bottom">
        <span class="tiny-label" id="sync-label">Sin sincronizar</span>
        <a id="spotify-link" class="open-spotify hidden" href="#" target="_blank" rel="noreferrer">
          Abrir en Spotify ↗
        </a>
      </div>
    </section>

    <!-- CHORDS CARD -->
    <section class="card chords-card">
      <div class="card-head">
        <div>
          <p class="section-label">Acordes</p>
          <h2>Acordes de la canción</h2>
        </div>
        <span class="status-pill status-pill-muted" id="chords-pill">Esperando</span>
      </div>

      <div class="source-switcher" id="source-switcher" style="display:none"></div>
      <div id="chords-key-badge" class="key-badge" style="display:none">
        <span class="chords-key-val">—</span>
        <span class="chords-tempo-val">—</span>
      </div>
      <div class="chords-chips-row" id="chords-chips-row"></div>

      <div id="chords-sections">
        <div class="chords-placeholder" id="chords-status-text">
          Los acordes aparecerán aquí automáticamente.
        </div>
      </div>
    </section>

  </div><!-- /page-shell -->

    <!-- Floating controls bar — fixed at bottom -->
  <div class="ctrl-bar" id="scroll-controls" style="display:none">
    <button class="ctrl-btn" id="scroll-slower" title="Más lento">−</button>
    <button class="ctrl-btn ctrl-play paused" id="scroll-toggle">&#x25B6; Auto</button>
    <button class="ctrl-btn" id="scroll-faster" title="Más rápido">+</button>
    <span class="ctrl-val" id="scroll-speed-label">1×</span>
    <span class="ctrl-div"></span>
    <button class="ctrl-btn ctrl-sync" id="sync-scroll-btn" title="Sincronizar con duración de canción">♫ Sync</button>
    <span class="ctrl-div"></span>
    <button class="ctrl-btn" id="transpose-down" title="Bajar semitono" style="font-size:12px;letter-spacing:-0.5px">−½</button>
    <span class="ctrl-val" id="transpose-label">0</span>
    <button class="ctrl-btn" id="transpose-up" title="Subir semitono" style="font-size:12px;letter-spacing:-0.5px">+½</button>
    <span class="ctrl-div"></span>
    <button class="ctrl-btn ctrl-enh" id="enharmonic-btn" title="Convertir bemoles a sostenidos">b↔#</button>
  </div>
  <div class="scroll-controls-placeholder" id="scroll-controls-placeholder"></div>

  <!-- FAB scroll top -->
  <button id="scroll-top-fab">↑</button>

  <!-- Hidden legacy inputs for app.js -->
  <input id="redirect-uri" type="hidden">
  <input id="spotify-client-id" type="hidden">
  <input id="worker-url" type="hidden">
  <button id="copy-url-btn" style="display:none"></button>

  <script src="./app.js" defer></script>
</body>
</html>
